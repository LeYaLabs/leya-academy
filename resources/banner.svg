<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <rect width="1280" height="320" fill="#020617"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>
  <!-- Subtle eye symbol centered -->
  <circle cx="640" cy="160" r="50" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.25"/>
  <ellipse cx="640" cy="160" rx="16" ry="20" fill="#00d4ff" opacity="0.35"/>
  <circle cx="640" cy="160" r="5" fill="#020617"/>
  <!-- Horizontal accent lines -->
  <line x1="400" y1="160" x2="570" y2="160" stroke="#00d4ff" stroke-width="0.5" opacity="0.12"/>
  <line x1="710" y1="160" x2="880" y2="160" stroke="#00d4ff" stroke-width="0.5" opacity="0.12"/>
</svg>